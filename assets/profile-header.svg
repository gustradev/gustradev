<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">gustradev — Fullstack Developer</title>
  <desc id="desc">Animated professional banner for GitHub profile.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0F1C"/>
      <stop offset="0.4" stop-color="#0D1525"/>
      <stop offset="1" stop-color="#111D35"/>
      <animate attributeName="x2" values="1200;1100;1200" dur="20s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Accent glow gradient -->
    <linearGradient id="glow1" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <animate attributeName="x1" values="0;100;0" dur="14s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="glow2" x1="600" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.30"/>
      <animate attributeName="x2" values="1200;1100;1200" dur="16s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Gradient for accent line -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#06B6D4"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="0.8" stop-color="#10B981"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>

    <!-- Scanning line gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0V40H0" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>

    <!-- Dot matrix pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#FFFFFF" fill-opacity="0.06"/>
    </pattern>

    <!-- Clip for rounded corners -->
    <clipPath id="roundClip">
      <rect width="1200" height="400" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Base background -->
    <rect width="1200" height="400" fill="url(#bg)"/>
    <rect width="1200" height="400" fill="url(#grid)"/>
    <rect width="1200" height="400" fill="url(#dots)"/>

    <!-- Floating orbs with glow effect -->
    <g filter="url(#softBlur)">
      <ellipse cx="200" cy="100" rx="180" ry="140" fill="#06B6D4" fill-opacity="0.08">
        <animate attributeName="cx" values="200;260;200" dur="18s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="100;140;100" dur="15s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="900" cy="80" rx="200" ry="160" fill="#8B5CF6" fill-opacity="0.07">
        <animate attributeName="cx" values="900;840;900" dur="16s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="80;120;80" dur="20s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="1050" cy="320" rx="180" ry="130" fill="#10B981" fill-opacity="0.08">
        <animate attributeName="cx" values="1050;990;1050" dur="14s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="320;280;320" dur="12s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="400" cy="350" rx="150" ry="120" fill="#3B82F6" fill-opacity="0.06">
        <animate attributeName="cx" values="400;450;400" dur="17s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="350;310;350" dur="13s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Horizontal scan line animation -->
    <rect x="-200" y="0" width="200" height="400" fill="url(#scanGrad)" opacity="0.15">
      <animate attributeName="x" values="-200;1400" dur="8s" repeatCount="indefinite"/>
    </rect>

    <!-- Decorative code particles floating -->
    <g opacity="0.25" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#67E8F9">
      <text x="60" y="60" opacity="0.5">const</text>
      <text x="920" y="45" opacity="0.4">async</text>
      <text x="1080" y="90" opacity="0.3">deploy()</text>
      <text x="780" y="370" opacity="0.4">export</text>
      <text x="100" y="360" opacity="0.3">import</text>
      <text x="1000" y="200" opacity="0.35">return</text>
      <text x="50" y="200" opacity="0.25">interface</text>

      <!-- Animated floating code particles -->
      <text x="300" y="50" opacity="0.4">
        <animate attributeName="y" values="50;40;50" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.2;0.4" dur="6s" repeatCount="indefinite"/>
        {  }
      </text>
      <text x="700" y="380" opacity="0.3">
        <animate attributeName="y" values="380;370;380" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.15;0.3" dur="5s" repeatCount="indefinite"/>
        =&gt;
      </text>
      <text x="1120" y="350" opacity="0.35">
        <animate attributeName="y" values="350;340;350" dur="7s" repeatCount="indefinite"/>
        ./src
      </text>
    </g>

    <!-- Floating tech dots -->
    <g>
      <circle cx="150" cy="130" r="2" fill="#06B6D4" opacity="0.7">
        <animate attributeName="cy" values="130;118;130" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="350" cy="80" r="1.5" fill="#8B5CF6" opacity="0.6">
        <animate attributeName="cy" values="80;70;80" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="550" cy="50" r="2" fill="#10B981" opacity="0.5">
        <animate attributeName="cy" values="50;40;50" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1100" cy="150" r="2.5" fill="#F59E0B" opacity="0.4">
        <animate attributeName="cy" values="150;138;150" dur="4.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.15;0.4" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="850" cy="100" r="1.5" fill="#EC4899" opacity="0.5">
        <animate attributeName="cy" values="100;90;100" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="650" cy="350" r="2" fill="#06B6D4" opacity="0.4">
        <animate attributeName="cy" values="350;340;350" dur="4.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="300" r="1.5" fill="#8B5CF6" opacity="0.5">
        <animate attributeName="cy" values="300;290;300" dur="3.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Main content glass card -->
    <rect x="50" y="50" width="1100" height="300" rx="20" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

    <!-- Inner accent line (animated) -->
    <line x1="80" y1="155" x2="380" y2="155" stroke="url(#lineGrad)" stroke-width="2" stroke-opacity="0.6">
      <animate attributeName="x2" values="380;420;380" dur="6s" repeatCount="indefinite"/>
    </line>

    <!-- Badge label -->
    <rect x="80" y="72" width="172" height="28" rx="14" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="109" y="91" fill="#67E8F9" font-family="'Fira Code', monospace" font-size="12" letter-spacing="2" opacity="0.9">FULLSTACK DEV</text>

    <!-- Animated circle dots in badge -->
    <circle cx="92" cy="86" r="3" fill="#06B6D4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Main title -->
    <text x="80" y="138" fill="#FFFFFF" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" filter="url(#textGlow)">Gustra</text>
    <text x="243" y="138" fill="#06B6D4" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" filter="url(#textGlow)">dev</text>

    <!-- Subtitle -->
    <text x="80" y="190" fill="#94A3B8" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="18" font-weight="400">Building real systems that survive deployment</text>

    <!-- Tech stack mini badges row -->
    <g transform="translate(80, 215)">
      <!-- Node.js -->
      <rect x="0" y="0" width="70" height="24" rx="6" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="11" y="16" fill="#6EE7B7" font-family="monospace" font-size="10">Node.js</text>

      <!-- TypeScript -->
      <rect x="80" y="0" width="86" height="24" rx="6" fill="#3B82F6" fill-opacity="0.12" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="91" y="16" fill="#93C5FD" font-family="monospace" font-size="10">TypeScript</text>

      <!-- React -->
      <rect x="176" y="0" width="58" height="24" rx="6" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="187" y="16" fill="#67E8F9" font-family="monospace" font-size="10">React</text>

      <!-- NestJS -->
      <rect x="244" y="0" width="62" height="24" rx="6" fill="#EC4899" fill-opacity="0.12" stroke="#EC4899" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="255" y="16" fill="#F9A8D4" font-family="monospace" font-size="10">NestJS</text>

      <!-- PostgreSQL -->
      <rect x="316" y="0" width="86" height="24" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="327" y="16" fill="#C4B5FD" font-family="monospace" font-size="10">PostgreSQL</text>

      <!-- Docker -->
      <rect x="412" y="0" width="62" height="24" rx="6" fill="#2563EB" fill-opacity="0.12" stroke="#2563EB" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="423" y="16" fill="#93C5FD" font-family="monospace" font-size="10">Docker</text>

      <!-- Python -->
      <rect x="484" y="0" width="62" height="24" rx="6" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="0.6"/>
      <text x="495" y="16" fill="#FCD34D" font-family="monospace" font-size="10">Python</text>
    </g>

    <!-- Stats section (right side) -->
    <g transform="translate(720, 80)">
      <!-- Projects count -->
      <rect x="0" y="0" width="150" height="70" rx="12" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
      <text x="75" y="35" text-anchor="middle" fill="#06B6D4" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700">15+</text>
      <text x="75" y="55" text-anchor="middle" fill="#64748B" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Projects Built</text>

      <!-- Stack depth -->
      <rect x="165" y="0" width="150" height="70" rx="12" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
      <text x="240" y="35" text-anchor="middle" fill="#8B5CF6" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700">Full</text>
      <text x="240" y="55" text-anchor="middle" fill="#64748B" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Stack Depth</text>

      <!-- Focus areas -->
      <rect x="0" y="85" width="315" height="70" rx="12" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
      <text x="158" y="117" text-anchor="middle" fill="#10B981" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600">Civic Tech · SaaS · IoT · Accounting</text>
      <text x="158" y="140" text-anchor="middle" fill="#64748B" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Domain Expertise</text>
    </g>

    <!-- Activity pulse indicators (right side) -->
    <g transform="translate(720, 260)">
      <circle cx="10" cy="10" r="4" fill="#10B981" opacity="0.8">
        <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="22" y="14" fill="#94A3B8" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Actively shipping production systems</text>
    </g>

    <!-- Bottom accent gradient bar -->
    <rect x="0" y="394" width="1200" height="6" fill="url(#lineGrad)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Animated connection lines -->
    <path d="M80 290 Q200 270 320 285 Q440 300 560 280 Q680 260 750 275" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.2" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M400 320 Q520 300 640 315 Q760 330 880 310 Q1000 290 1100 305" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.15" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
