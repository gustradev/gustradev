<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">gustradev profile header</title>
  <desc id="desc">Soft professional animated banner for GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
      <animate attributeName="x1" values="0;140;0" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1200;1060;1200" dur="18s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="48" x2="930" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.60"/>
      <stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#A7F3D0" stop-opacity="0.40"/>
      <animate attributeName="x1" values="180;260;180" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="930;850;930" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="white" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="28" fill="url(#grid)"/>

  <g filter="url(#blur)">
    <circle cx="980" cy="82" r="120" fill="#22D3EE" fill-opacity="0.18">
      <animate attributeName="cx" values="980;1015;980" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="82;96;82" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="228" r="98" fill="#34D399" fill-opacity="0.16">
      <animate attributeName="cx" values="1040;1010;1040" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="228;210;228" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="284" r="124" fill="#0EA5E9" fill-opacity="0.10">
      <animate attributeName="cx" values="180;220;180" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="284;250;284" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="54" y="48" width="1092" height="224" rx="24" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <path d="M54 120C222 92 299 174 455 148C626 120 691 66 855 88C993 107 1057 164 1146 146" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.9"/>

  <g opacity="0.85">
    <circle cx="822" cy="110" r="4" fill="#67E8F9">
      <animate attributeName="cy" values="110;102;110" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="905" cy="178" r="4" fill="#A7F3D0">
      <animate attributeName="cy" values="178;170;178" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1042" cy="136" r="4" fill="#7DD3FC">
      <animate attributeName="cy" values="136;128;136" dur="4.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="92" y="110" fill="#E5EEF7" font-family="Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="3">GUSTRADEV</text>
  <text x="92" y="164" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Building village systems,</text>
  <text x="92" y="212" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">operational SaaS, and practical infrastructure.</text>
  <text x="92" y="250" fill="#C7D2DE" font-family="Segoe UI, Arial, sans-serif" font-size="20">Focused on BUMDes, civic platforms, accounting flows, geospatial tools, and AI-assisted products.</text>
</svg>
