<svg width="900" height="164" viewBox="0 0 900 164" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="gustradev achievements">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161B27"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card 1: Production Systems -->
  <g filter="url(#cardShadow)">
    <rect x="4" y="4" width="140" height="156" rx="12" fill="url(#cardBg)" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="4" y="4" width="140" height="4" rx="2" fill="url(#goldGrad)" opacity="0.9"/>
    <text x="74" y="50" text-anchor="middle" font-size="30" filter="url(#iconGlow)">🏆</text>
    <text x="74" y="95" text-anchor="middle" fill="#F59E0B" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="800">15+</text>
    <text x="74" y="113" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Production</text>
    <text x="74" y="126" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Systems</text>
    <text x="74" y="148" text-anchor="middle" fill="#F59E0B" font-family="'Segoe UI',sans-serif" font-size="9" opacity="0.6">Shipped &amp; Running</text>
  </g>

  <!-- Card 2: Full Stack -->
  <g filter="url(#cardShadow)">
    <rect x="152" y="4" width="140" height="156" rx="12" fill="url(#cardBg)" stroke="#06B6D4" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="152" y="4" width="140" height="4" rx="2" fill="url(#cyanGrad)" opacity="0.9"/>
    <text x="222" y="50" text-anchor="middle" font-size="30" filter="url(#iconGlow)">⚡</text>
    <text x="222" y="95" text-anchor="middle" fill="#06B6D4" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="800">Full</text>
    <text x="222" y="113" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Stack</text>
    <text x="222" y="126" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Depth</text>
    <text x="222" y="148" text-anchor="middle" fill="#06B6D4" font-family="'Segoe UI',sans-serif" font-size="9" opacity="0.6">Frontend + Backend</text>
  </g>

  <!-- Card 3: Domains -->
  <g filter="url(#cardShadow)">
    <rect x="300" y="4" width="140" height="156" rx="12" fill="url(#cardBg)" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="300" y="4" width="140" height="4" rx="2" fill="url(#purpleGrad)" opacity="0.9"/>
    <text x="370" y="50" text-anchor="middle" font-size="30" filter="url(#iconGlow)">🗺️</text>
    <text x="370" y="95" text-anchor="middle" fill="#8B5CF6" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="800">5+</text>
    <text x="370" y="113" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Domain</text>
    <text x="370" y="126" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Expertise</text>
    <text x="370" y="148" text-anchor="middle" fill="#8B5CF6" font-family="'Segoe UI',sans-serif" font-size="9" opacity="0.6">Civic · SaaS · IoT</text>
  </g>

  <!-- Card 4: Active Shipper -->
  <g filter="url(#cardShadow)">
    <rect x="448" y="4" width="140" height="156" rx="12" fill="url(#cardBg)" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="448" y="4" width="140" height="4" rx="2" fill="url(#greenGrad)" opacity="0.9"/>
    <text x="518" y="50" text-anchor="middle" font-size="30" filter="url(#iconGlow)">🔥</text>
    <text x="518" y="90" text-anchor="middle" fill="#10B981" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="800">Active</text>
    <text x="518" y="113" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Shipping</text>
    <text x="518" y="126" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Consistently</text>
    <text x="518" y="148" text-anchor="middle" fill="#10B981" font-family="'Segoe UI',sans-serif" font-size="9" opacity="0.6">Field-Ready Products</text>
  </g>

  <!-- Card 5: Tech Mastery -->
  <g filter="url(#cardShadow)">
    <rect x="596" y="4" width="140" height="156" rx="12" fill="url(#cardBg)" stroke="#EC4899" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="596" y="4" width="140" height="4" rx="2" fill="url(#pinkGrad)" opacity="0.9"/>
    <text x="666" y="50" text-anchor="middle" font-size="30" filter="url(#iconGlow)">🛠️</text>
    <text x="666" y="95" text-anchor="middle" fill="#EC4899" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="800">20+</text>
    <text x="666" y="113" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Tools &amp;</text>
    <text x="666" y="126" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Technologies</text>
    <text x="666" y="148" text-anchor="middle" fill="#EC4899" font-family="'Segoe UI',sans-serif" font-size="9" opacity="0.6">Mastered in Stack</text>
  </g>

  <!-- Card 6: Architecture -->
  <g filter="url(#cardShadow)">
    <rect x="744" y="4" width="140" height="156" rx="12" fill="url(#cardBg)" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="744" y="4" width="140" height="4" rx="2" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="814" y="50" text-anchor="middle" font-size="30" filter="url(#iconGlow)">🏗️</text>
    <text x="814" y="88" text-anchor="middle" fill="#3B82F6" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="800">Micro</text>
    <text x="814" y="103" text-anchor="middle" fill="#3B82F6" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="800">Services</text>
    <text x="814" y="122" text-anchor="middle" fill="#94A3B8" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="500">Architecture</text>
    <text x="814" y="148" text-anchor="middle" fill="#3B82F6" font-family="'Segoe UI',sans-serif" font-size="9" opacity="0.6">Docker · Nginx · Redis</text>
  </g>
</svg>
